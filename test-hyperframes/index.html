<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #020704;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      .clip {
        position: absolute;
        left: 0;
        top: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <!-- Composición Principal de HyperFrames -->
    <div data-hf-id="root" id="root" data-composition-id="main" data-start="0" data-duration="6" data-width="1920" data-height="1080">
      
      <!-- Fondo Base de la Amazonía Boliviana -->
      <img data-hf-id="bg-home" id="bg-image" class="clip" src="bg_home.webp" data-start="0" data-duration="6" data-track-index="1" style="z-index: 1;">
      
      <!-- Micro-capa de luz o atmósfera verde sutil -->
      <div data-hf-id="atm-overlay" id="overlay" class="clip" data-start="0" data-duration="6" data-track-index="2" 
           style="z-index: 2; background: radial-gradient(circle at 50% 50%, rgba(0, 224, 60, 0.05) 0%, rgba(0, 0, 0, 0.4) 100%); mix-blend-mode: screen; pointer-events: none;">
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      // Animación determinista: Ken Burns (acercamiento lento)
      tl.fromTo("#bg-image", 
        { scale: 1.0, x: 0, y: 0 }, 
        { scale: 1.06, x: -10, y: -5, duration: 6, ease: "sine.inOut" }, 
        0
      );

      // Sutil oscilación de la opacidad del overlay atmosférico
      tl.fromTo("#overlay",
        { opacity: 0.6 },
        { opacity: 0.9, duration: 3, yoyo: true, repeat: 1, ease: "power1.inOut" },
        0
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
